<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form | MATEO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            font-family: 'Helvetica', Arial, sans-serif;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border: 1px solid #000000;
            border-radius: 8px;
            max-width: 700px;
            margin: 50px auto;
        }
        h1 {
            color: #000000;
            text-align: center;
            margin-bottom: 20px;
        }
        legend {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffffff;
            background-color: #371515;
            padding: 10px 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div class="form-container shadow-sm">
        <h1 class="mb-4">Contact Form</h1>
        <hr class="my-4">
        <form action="thank-you.html" method="post">
            
            <fieldset>
                <legend>Personal Information</legend>
            
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fullname" class="form-label">Full Name</label>
                        <input type="text" class="form-control form-control-lg bg-light" id="fullname" name="fullname" placeholder="Enter Full Name" aria-label="Full Name">
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control form-control-sm bg-light" id="email" name="email" placeholder="Enter Email" aria-label="Email Address">
                    </div>
                </div>
                <hr class="my-4">
                <div class="row mb-3">
                    <label for="message" class="col-sm-4 col-form-label">Message</label>
                    <div class="col-sm-8">
                        <textarea class="form-control bg-light" id="message" name="message" rows="4" placeholder="Enter Message" aria-label="Message content"></textarea>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <label class="col-sm-4 col-form-label">Preferred Contact Method</label>
                    
                    <div class="col-sm-8">
                        <div class="p-3 border rounded bg-info-subtle">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="checkEmail" value="email" aria-label="Contact via Email">
                                <label class="form-check-label" for="checkEmail">Email</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="checkPhone" value="phone" aria-label="Contact via Phone">
                                <label class="form-check-label" for="checkPhone">Phone</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="checkWhatsapp" value="whatsapp" aria-label="Contact via WhatsApp">
                                <label class="form-check-label" for="checkWhatsapp">WhatsApp</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <label for="favoriteColor" class="col-sm-4 col-form-label">Favorite Color</label>
                    
                    <div class="col-sm-2">
                        <input type="color" class="form-control form-control-color w-100" id="favoriteColor" 
                            name="favoriteColor" value="#000000" title="Choose your favorite color" aria-label="Color Picker">
                    </div>
                </div>
                <hr class="my-4">
            </fieldset>
            
            <fieldset>
                <legend>Additional Information</legend>

                <div class="row mb-3 align-items-center">
                    <label for="userId" class="col-sm-3 col-form-label">User ID</label>
                    <div class="col-sm-9">
                        <input class="form-control bg-danger-subtle" type="text" id="userId" value="ID-9999" disabled aria-label="User Identification Number">
                    </div>
                </div>

                <div class="row mb-4 align-items-center">
                    <label for="accountType" class="col-sm-3 col-form-label">Account Type</label>
                    <div class="col-sm-9">
                        <input type="text" readonly class="form-control-plaintext border-bottom ps-2" id="accountType" value="Student" aria-label="Account Type">
                    </div>
                </div>
            </fieldset>
            <button type="submit" class="btn btn-success btn-lg">Submit</button>
        </form>
    </div>
</body>
</html>
